---
# Install chrony on Ubuntu and configure it as an NTP slave to a single master
- name: Install and configure chrony
  hosts: all
  become: true
  gather_facts: true
  gather_timeout: 10
  ignore_unreachable: false

  vars:
    chrony_master_ip: "10.10.47.122"
    chrony_conf_path: /etc/chrony/chrony.conf

  tasks:

    - name: Install chrony
      ansible.builtin.apt:
        name: chrony
        state: present
        update_cache: true

    - name: Configure chrony to use only the master NTP server
      ansible.builtin.copy:
        dest: "{{ chrony_conf_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Ansible - chrony NTP slave configuration
          # Use only the designated master NTP server
          server {{ chrony_master_ip }} iburst prefer

          # Record the rate at which the system clock gains/loses time
          driftfile /var/lib/chrony/drift

          # Allow the system clock to be stepped in the first three updates
          # if its offset is larger than 1 second
          makestep 1.0 3

          # Enable kernel synchronisation of the real-time clock (RTC)
          rtcsync

          # Specify directory for log files
          logdir /var/log/chrony
      notify: Restart chrony

    - name: Ensure chrony service is enabled and running
      ansible.builtin.service:
        name: chrony
        state: started
        enabled: true

  handlers:

    - name: Restart chrony
      ansible.builtin.service:
        name: chrony
        state: restarted

    - name: Run chronyc tracking
      ansible.builtin.command: chronyc tracking
      register: chronyc_tracking_result
      changed_when: false
      listen: Restart chrony

    - name: Show chronyc tracking output
      ansible.builtin.debug:
        msg: "{{ chronyc_tracking_result.stdout_lines }}"
      listen: Restart chrony
