---
- name: Start Cagelab Services
  hosts: all
  gather_facts: true
  vars:
    user_services:
      - cogmoteGO
      - theConductor
      - mediamtx
      - obs
  tasks:
    - name: Start user-scoped systemd services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        scope: user
        daemon_reload: true
      become: true
      become_user: "{{ ansible_facts['user_id'] }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts['user_uid'] }}"
      loop: "{{ user_services }}"
      register: service_start
      failed_when: false
      # Per-item changed_when not supported with loops on systemd module;
      # failures are reported via the debug task below.
      changed_when: false

    - name: Report services that failed to start
      ansible.builtin.debug:
        msg: "Service '{{ item.item }}' did not start: {{ item.status | default('unknown') }}"
      loop: "{{ service_start.results }}"
      when: item is failed or item.status.ActiveState | default('') != 'active'
